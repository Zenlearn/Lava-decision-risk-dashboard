services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lava
    ports:
      # Host port 5433, not 5432 — defensive against anything else on the box
      # (this VM already runs PathwaysBackend + MongoDB tooling). Internal
      # container port stays 5432; Lava's own app reaches it via the Docker
      # network as "postgres:5432" regardless of the host-side mapping.
      - "5433:5432"
    volumes:
      - lava-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # NOTE: no host port published. PathwaysBackend's docker-compose.yml
    # already binds host port 6379 for its own Redis container on this same
    # VM — publishing 6379 here too would collide and fail to start. Lava's
    # app container reaches this one internally via the Docker network as
    # "redis:6379"; nothing outside Docker needs to reach it directly.
    volumes:
      - lava-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  lava-api:
    build: .
    container_name: pathwaysbackend-lava-api-1
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3010:3010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  lava-postgres-data:
  lava-redis-data:
